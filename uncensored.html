<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - JavGG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #0a0a0a; --accent-color: #E50914; --card-bg: #1a1a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-color); color: #fff; padding-bottom: 80px; }
        
        .container { padding: 20px 12px; }
        h2 { margin-bottom: 20px; font-size: 1.2rem; border-left: 4px solid var(--accent-color); padding-left: 10px; }

        /* Grilla de 3 columnas */
        .anime-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }

        .anime-card { 
            position: relative; 
            aspect-ratio: 2/3; 
            background: #1a1a1a; 
            border-radius: 6px; 
            overflow: hidden; 
            cursor: pointer;
        }

        .anime-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 0.5s; 
        }

        .card-id-tag { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.7); 
            font-size: 10px; 
            text-align: center; 
            padding: 3px 0; 
        }

        /* Esqueleto de carga */
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { to { background-position: -200% 0; } }

        /* Menú Inferior */
        .bottom-menu { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .menu-item { color: #888; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .menu-item.active { color: var(--accent-color); }
        .menu-item i { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Catálogo Completo</h2>
    <div class="anime-grid" id="main-grid">
        </div>
</div>

<nav class="bottom-menu">
    <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="uncensored.html" class="menu-item active"><i class="fas fa-bolt"></i><span>Uncensored</span></a>
    <a href="index.html" class="menu-item"><i class="fas fa-search"></i><span>Buscar</span></a>
</nav>

<script src="code.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const grid = document.getElementById("main-grid");

        // Verificamos que la base de datos exista
        if (typeof baseDeDatos !== 'undefined' && baseDeDatos.length > 0) {
            
            // Recorremos TODA la base de datos de code.js
            grid.innerHTML = baseDeDatos.map(peli => `
                <div class="anime-card skeleton" onclick="abrirDetalle('${peli.id}')">
                    <img src="${peli.poster}" onload="this.style.opacity='1'; this.parentElement.classList.remove('skeleton')">
                    <div class="card-id-tag">${peli.id}</div>
                </div>
            `).join('');

        } else {
            grid.innerHTML = "<p>No hay películas en la base de datos.</p>";
        }
    });

    function abrirDetalle(id) {
        localStorage.setItem('peli_id', id);
        window.location.href = 'detalles.html';
    }
</script>

</body>
</html>
